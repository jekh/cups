name: Build arm64 .deb

on:
  workflow_dispatch:

jobs:
  build-arm64-deb:
    runs-on: ubuntu-24.04-arm

    steps:
    - name: Checkout CUPS sources
      uses: actions/checkout@v6

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          autoconf \
          avahi-daemon \
          libavahi-client-dev \
          libssl-dev \
          libpam-dev \
          libusb-1.0-0-dev \
          zlib1g-dev \
          pkg-config \
          checkinstall

    - name: Configure CUPS
      run: ./configure --prefix=/usr --sysconfdir=/etc --localstatedir=/var

    - name: Build CUPS
      run: make -j$(nproc)

    - name: Create .deb package
      run: |
        sudo checkinstall --pkgname=cups-custom \
          --pkgversion="2.5.0~b1" \
          --pkgrelease=1 \
          --arch=arm64 \
          --requires='libavahi-client3,libssl3t64,libpam0g,libusb-1.0-0,zlib1g' \
          --maintainer='jekh' \
          --nodoc \
          --default \
          --fstrans=no \
          make install
        find / -name "*.deb" -newer configure -type f 2>/dev/null
        cp $(find / -name "cups-custom*.deb" -type f 2>/dev/null | head -1) $GITHUB_WORKSPACE/ || true
        ls -la $GITHUB_WORKSPACE/*.deb

    - name: Upload .deb artifact
      uses: actions/upload-artifact@v7
      with:
        name: cups-arm64-deb
        path: "${{ github.workspace }}/*.deb"
        if-no-files-found: error
